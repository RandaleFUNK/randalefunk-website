name: Deploy to RandaleFUNK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create private stats config
        env:
          STATS_DB_HOST: ${{ secrets.STATS_DB_HOST }}
          STATS_DB_NAME: ${{ secrets.STATS_DB_NAME }}
          STATS_DB_USER: ${{ secrets.STATS_DB_USER }}
          STATS_DB_PASSWORD: ${{ secrets.STATS_DB_PASSWORD }}
          STATS_AUTH_USER: ${{ secrets.STATS_AUTH_USER }}
          STATS_AUTH_PASSWORD: ${{ secrets.STATS_AUTH_PASSWORD }}
          STATS_HASH_SALT: ${{ secrets.STATS_HASH_SALT }}
        run: |
          STATS_AUTH_PASSWORD_HASH="$(php -r 'echo password_hash(getenv("STATS_AUTH_PASSWORD") ?: "", PASSWORD_DEFAULT);')"
          export STATS_AUTH_PASSWORD_HASH
          python3 - <<'PY'
          import os
          from pathlib import Path

          def php_string(value):
              return "'" + value.replace("\\", "\\\\").replace("'", "\\'") + "'"

          hash_salt = os.environ.get("STATS_HASH_SALT") or os.environ.get("STATS_DB_PASSWORD", "")

          config = f"""<?php
          return [
              'db' => [
                  'host' => {php_string(os.environ.get("STATS_DB_HOST", ""))},
                  'name' => {php_string(os.environ.get("STATS_DB_NAME", ""))},
                  'user' => {php_string(os.environ.get("STATS_DB_USER", ""))},
                  'password' => {php_string(os.environ.get("STATS_DB_PASSWORD", ""))},
                  'charset' => 'utf8mb4',
              ],
              'auth' => [
                  'user' => {php_string(os.environ.get("STATS_AUTH_USER", ""))},
                  'password_hash' => {php_string(os.environ.get("STATS_AUTH_PASSWORD_HASH", ""))},
              ],
              'hash_salt' => {php_string(hash_salt)},
          ];
          """

          Path("stats").mkdir(exist_ok=True)
          Path("stats/config.php").write_text(config, encoding="utf-8")
          PY

      - name: Build deploy package
        run: |
          set -euo pipefail
          rm -rf deploy
          mkdir -p deploy

          cp index.html deploy/
          cp style.css deploy/
          cp script.js deploy/
          cp track.php deploy/
          cp site.webmanifest deploy/

          if [ -f datenschutz.html ]; then cp datenschutz.html deploy/; fi

          cp -R assets deploy/
          cp -R data deploy/
          cp -R kolumnen deploy/
          cp -R randalf deploy/
          cp -R reviews deploy/
          cp -R vorab-gehoert deploy/
          cp -R wuerfel deploy/
          cp -R stats deploy/

          rm -rf deploy/wuerfel/Netlify-Upload
          find deploy -name ".git" -o -name ".github" -o -name "Backups" -o -name "Temp_Daten" -o -name "tools" | xargs -r rm -rf
          find deploy -type f \( -name "*.zip" -o -name "*.log" -o -name "*.md" -o -name ".env" -o -name ".gitignore" -o -name "AGENTS.md" \) -delete

      - name: Remove old public internal files
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_TARGET_DIR: ${{ secrets.FTP_TARGET_DIR }}
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y lftp
          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "sftp://$FTP_SERVER" <<EOF
          set sftp:auto-confirm yes
          rm -f "$FTP_TARGET_DIR/AGENTS.md"
          rm -f "$FTP_TARGET_DIR/README.md"
          rm -f "$FTP_TARGET_DIR/stats/README.md"
          rm -f "$FTP_TARGET_DIR/wuerfel/README.md"
          rm -f "$FTP_TARGET_DIR/wuerfel/rules.md"
          rm -f "$FTP_TARGET_DIR/wuerfel/quotes.md"
          rm -f "$FTP_TARGET_DIR/wuerfel/data/README.md"
          rm -f "$FTP_TARGET_DIR/assets/news/README.md"
          rm -f "$FTP_TARGET_DIR/assets/reviews/README.md"
          rm -f "$FTP_TARGET_DIR/assets/stickers/README.md"
          rm -f "$FTP_TARGET_DIR/assets/vorab-gehoert/README.md"
          rm -rf "$FTP_TARGET_DIR/wuerfel/Netlify-Upload"
          rm -rf "$FTP_TARGET_DIR/tools"
          rm -rf "$FTP_TARGET_DIR/Backups"
          rm -rf "$FTP_TARGET_DIR/Temp_Daten"
          bye
          EOF

      - name: Upload website via SFTP
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_TARGET_DIR: ${{ secrets.FTP_TARGET_DIR }}
        run: |
          set -euo pipefail
          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "sftp://$FTP_SERVER" <<EOF
          set sftp:auto-confirm yes
          mirror -R --verbose --only-newer deploy/ "$FTP_TARGET_DIR"
          bye
          EOF
